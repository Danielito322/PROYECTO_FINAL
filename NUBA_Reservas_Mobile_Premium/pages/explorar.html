<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a1018">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="../manifest.webmanifest">
    <title>Explorar · NUBA</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages.css">
  </head>
  <body data-page="explore" data-root="../">
    <main class="app-shell">
      <section class="page-content">
        <header class="topbar">
          <div>
            <div class="eyebrow">Encuentra tu próximo plan</div>
            <h1 id="explore-title">Explorar lugares</h1>
            <p id="explore-subtitle">Filtra por tipo de experiencia y reserva.</p>
          </div>
          <a class="icon-btn" href="mapa.html">
            <span id="explore-map-icon">
            </span>
          </a>
        </header>
        <div class="search">
          <span id="explore-search-icon">
          </span>
          <input id="venue-search" placeholder="Buscar local, servicio o zona">
        </div>
        <div class="chips" style="margin-top:13px">
          <button class="chip active" data-filter="todos">Todo</button>
          <button class="chip" data-filter="deportes">Deportes</button>
          <button class="chip" data-filter="belleza">Belleza</button>
          <button class="chip" data-filter="entretenimiento">Entretenimiento</button>
        </div>
        <section style="margin-top:16px" id="venue-list"></section></section>
      </main>
      <nav id="app-nav">
      </nav>
      <div id="toast" class="toast" role="status" aria-live="polite">
      </div>
      <script src="../assets/js/config.js">
      </script>
      <script src="../assets/js/nuba-core.js">
      </script>
      <script src="../assets/js/app-shell.js">
      </script>
      <script src="../assets/js/explore.js">
      </script>
      <script>document.getElementById("explore-map-icon").innerHTML=NUBA.icon("pin");document.getElementById("explore-search-icon").innerHTML=NUBA.icon("search");</script>
    </body>
  </html>

<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a1018">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="../manifest.webmanifest">
    <title>Mapa de Puno · NUBA</title>
    <link rel="stylesheet" href="../assets/css/base.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/pages.css">
  </head>
  <body data-page="map" data-root="../">
    <main class="app-shell">
      <section class="page-content">
        <header class="topbar">
          <div>
            <div class="eyebrow">Puno, Perú</div>
            <h1>Mapa de reservas</h1>
            <p>Descubre disponibilidad cerca de ti.</p>
          </div>
          <a class="icon-btn" href="explorar.html">
            <span id="map-search-icon">
            </span>
          </a>
        </header>
        <div class="chips" style="margin-bottom:12px">
          <button class="chip active" data-map-filter="todos">Todos</button>
          <button class="chip" data-map-filter="deportes">Deportes</button>
          <button class="chip" data-map-filter="belleza">Belleza</button>
          <button class="chip" data-map-filter="entretenimiento">Entretenimiento</button>
        </div>
        <section class="map-wrap">
          <div id="puno-map">
            <div class="map-fallback"><div class="map-marker-demo m1"></div>
            <div class="map-marker-demo m2">
            </div>
            <div class="map-marker-demo m3"></div></div>
          </div>
          <div class="map-label">
            <span id="map-pin-icon">
            </span>
            Mapa interactivo · Puno
          </div>
          <div class="map-legend">
            <h4>Reserva donde estés</h4>
            <p>Selecciona un marcador para ver disponibilidad, productos y horarios.</p>
            <a class="primary-btn full" href="explorar.html">Explorar lista de locales</a>
          </div>
        </section>
        <div class="section-head">
          <h3>Locales del mapa</h3>
        </div>
        <div id="map-venues">
        </div>
      </section>
    </main>
    <nav id="app-nav">
    </nav>
    <div id="toast" class="toast" role="status" aria-live="polite">
    </div>
    <script src="../assets/js/config.js">
    </script>
    <script src="../assets/js/nuba-core.js">
    </script>
    <script src="../assets/js/app-shell.js">
    </script>
    <script src="../assets/js/mapa.js">
    </script>
    <script>document.getElementById("map-search-icon").innerHTML=NUBA.icon("search");document.getElementById("map-pin-icon").innerHTML=NUBA.icon("pin","sm");document.querySelector(".m1").innerHTML=NUBA.icon("sport","sm");document.querySelector(".m2").innerHTML=NUBA.icon("beauty","sm");document.querySelector(".m3").innerHTML=NUBA.icon("entertainment","sm");</script>
  </body>
</html>
